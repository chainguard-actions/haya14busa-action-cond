name: Test cond with default empty if_true and if_false values
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action-true
        uses: .
        with:
          cond: 'true'
      - name: Assert output is empty when cond=true and if_true is default
        env:
          ACTUAL: ${{ steps.action-true.outputs.value }}
        run: |
          echo "actual: '$ACTUAL'"
          if [ "$ACTUAL" != "" ]; then
            echo "FAIL: expected empty string but got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
      - id: action-false
        uses: .
        with:
          cond: 'false'
      - name: Assert output is empty when cond=false and if_false is default
        env:
          ACTUAL: ${{ steps.action-false.outputs.value }}
        run: |
          echo "actual: '$ACTUAL'"
          if [ "$ACTUAL" != "" ]; then
            echo "FAIL: expected empty string but got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
