name: Test cond with default empty values
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action-true-default
        uses: .
        with:
          cond: 'true'
      - name: Assert output is empty when if_true defaults to empty
        env:
          ACTUAL: ${{ steps.action-true-default.outputs.value }}
        run: |
          echo "actual: '$ACTUAL'"
          if [ "$ACTUAL" != "" ]; then
            echo "FAIL: expected empty string but got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
      - id: action-false-default
        uses: .
        with:
          cond: 'false'
      - name: Assert output is empty when if_false defaults to empty
        env:
          ACTUAL: ${{ steps.action-false-default.outputs.value }}
        run: |
          echo "actual: '$ACTUAL'"
          if [ "$ACTUAL" != "" ]; then
            echo "FAIL: expected empty string but got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
