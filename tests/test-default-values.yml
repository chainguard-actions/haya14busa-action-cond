name: Test default empty values
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action-true-default
        uses: .
        with:
          cond: 'true'
          if_true: 'selected'
          # if_false defaults to ''
      - name: Assert output equals if_true when cond is true and if_false is default
        env:
          ACTUAL: ${{ steps.action-true-default.outputs.value }}
        run: |
          echo "actual: $ACTUAL"
          if [ "$ACTUAL" != "selected" ]; then
            echo "FAIL: expected 'selected' but got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
      - id: action-false-default
        uses: .
        with:
          cond: 'false'
          # if_true defaults to ''
          if_false: 'fallback'
      - name: Assert output equals if_false when cond is false and if_true is default
        env:
          ACTUAL: ${{ steps.action-false-default.outputs.value }}
        run: |
          echo "actual: $ACTUAL"
          if [ "$ACTUAL" != "fallback" ]; then
            echo "FAIL: expected 'fallback' but got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
      - id: action-empty-false
        uses: .
        with:
          cond: 'false'
          if_true: 'something'
          # if_false defaults to ''
      - name: Assert output is empty string when cond is false and if_false is default
        env:
          ACTUAL: ${{ steps.action-empty-false.outputs.value }}
        run: |
          echo "actual: '$ACTUAL'"
          if [ "$ACTUAL" != "" ]; then
            echo "FAIL: expected empty string but got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
