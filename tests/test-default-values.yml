name: Test default empty values when if_true and if_false are omitted
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          cond: 'true'
      - name: Assert output is empty string when if_true is not set
        env:
          ACTUAL: ${{ steps.action.outputs.value }}
        run: |
          echo "actual: '$ACTUAL'"
          if [ "$ACTUAL" != "" ]; then
            echo "FAIL: expected empty string but got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
