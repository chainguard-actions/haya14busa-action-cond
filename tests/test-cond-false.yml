name: Test cond=false returns if_false value
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          cond: 'false'
          if_true: 'yes-value'
          if_false: 'no-value'
      - name: Assert output equals if_false
        env:
          ACTUAL: ${{ steps.action.outputs.value }}
        run: |
          echo "actual: $ACTUAL"
          if [ "$ACTUAL" != "no-value" ]; then
            echo "FAIL: expected 'no-value' but got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
